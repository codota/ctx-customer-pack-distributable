version: '1.0'
metadata:
  name: ${PROJECT_NAME:-my-project}
  environment: production
ctx:
  apiUrl: ${CTX_API_URL}
  apiKey: ${CTX_API_KEY}
credentials:
  gitlab:
    type: gitlab_pat
    data:
      token: ${GITLAB_TOKEN}
  linear:
    type: api_key
    data:
      key: ${LINEAR_API_KEY}
  pagerduty:
    type: api_key
    data:
      key: ${PAGERDUTY_API_KEY}
workspaces:
  platform:
    sources:
      - name: code
        type: gitlab
        credential: gitlab
        config:
          owner: ${GITLAB_GROUP}
          repo: ${GITLAB_PROJECT}
        agents: [context-ingestor, dependency-mapper, gitlab-issues-ingestor, git-insights-analyzer]
      - name: issues
        type: linear
        credential: linear
        config:
          teamId: ${LINEAR_TEAM_ID}
        agents: []
      - name: oncall
        type: pagerduty
        credential: pagerduty
        config:
          serviceIds: ${PAGERDUTY_SERVICE_IDS}
